# storage.conf variant for podman running INSIDE the devenv container.
#
# Not used on the host: files under __additional_* dirs ship with the dist
# as-is; the devenv runner (devenv/scripts/opts.d/07-podman.sh) bind-mounts
# them over their default-named counterparts in ~/.config/containers, so this
# becomes the container's ~/.config/containers/storage.conf. storage.conf
# files replace, never merge, so this is a full copy of storage.conf with
# devenv-specific paths. Keep the structure in sync.
#
# Paths are written concretely against the devenv container (HOME=/root,
# mounts made by 07-podman.sh) instead of ${HOME}/${XDG_DATA_HOME} tokens:
# extract-time interpolation runs on the HOST, whose values are wrong here.
#
# See https://github.com/containers/storage/blob/master/docs/containers-storage.conf.5.md

[storage]

# Default Storage Driver, Must be set for proper operation.
driver = "overlay"

# Temporary storage location ($XDG_RUNTIME_DIR is runtime-expanded by
# containers/storage; the devenv runner sets it).
runroot = "$XDG_RUNTIME_DIR/containers/storage"

# Primary Read/Write location of container storage: the anonymous per-run
# volume mounted by 07-podman.sh (overlay-on-overlay is rejected, so the
# image's own filesystem cannot host it).
graphroot = "/root/.local/share/containers/graphroot"

[storage.options]

# The host image store, bind-mounted read-only by 07-podman.sh.
additionalimagestores = [
  "/root/.local/share/containers/host-graphroot",
]

[storage.options.overlay]
# Allow a non privileged user running with a single UID within a user
# namespace to run containers.
ignore_chown_errors = "true"

# Mount via fuse-overlayfs from the mounted dist instead of mounting directly.
mount_program = "/root/.local/share/podman-dist/current/usr/local/bin/fuse-overlayfs"

# mountopt specifies comma separated list of extra mount options
mountopt = "nodev,fsync=0"
