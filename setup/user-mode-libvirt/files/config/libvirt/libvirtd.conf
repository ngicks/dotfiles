# Session daemon config of the libvirt-sandbox user
# ($XDG_CONFIG_HOME/libvirt/libvirtd.conf).
#
# Publish the sockets outside /run/user/<uid> (which is 0700) so members of
# the libvirt-sandbox group can connect. The dir itself is created by
# /etc/tmpfiles.d/libvirt-sandbox.conf.
unix_sock_dir = "/run/libvirt-sandbox"
unix_sock_rw_perms = "0770"
unix_sock_ro_perms = "0770"

# Access control is the socket dir + socket modes above (group
# libvirt-sandbox); polkit would reject the cross-uid peers this setup exists
# for.
auth_unix_rw = "none"
auth_unix_ro = "none"
