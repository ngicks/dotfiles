PODMAN=${XDG_DATA_HOME:-$HOME/.local/share}/containers/bin/podman
PATH=${HOME}/.local/containers/libexec/podman:${HOME}/.local/containers/lib/podman:${HOME}/.local/containers/bin:${PATH}
# Quadlet unit search dir. Kept out of ~/.config/containers because the static
# podman installer (build/podman-static/install.sh) replaces that path with a
# symlink to the bundled etc/containers. Read by the rootless quadlet generator,
# whose units live in config/containers-quadlet (-> ~/.config/containers-quadlet).
QUADLET_UNIT_DIRS=${XDG_CONFIG_HOME:-$HOME/.config}/containers-quadlet
