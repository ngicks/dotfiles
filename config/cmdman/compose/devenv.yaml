name: devenv
commands:
  nvim:
    args: 
      - nvim
    tty: true
  shell:
    args: 
      - $HOME/.nix-profile/bin/zsh
      - -l
    stop_signal: SIGHUP
    tty: true
  claude:
    args:  
      - $HOME/.dotfiles/devenv_run.sh 
      - ""
      - -lc
      - claude
    scale: 3
    tty: true
  codex:
    args: 
      - $HOME/.dotfiles/devenv_run.sh
      - ""
      - -lc
      - codex
    scale: 3
    tty: true
mux:
  layouts:
    - name: default
      root:
        dir: h
        splits: [50%, 50%]
        panes:
          - dir: v
            splits: [1, 20%]
            panes:
              - nvim
              - shell
          - dir: v
            splits: [50%, 50%]
            panes:
              - command: claude
                focus: true
              - codex
    - name: claude-focused
      root:
        dir: h
        splits: [50%, 50%]
        panes:
          - dir: v
            splits: [1, 20%]
            panes:
              - nvim
              - shell
          - command: claude
            focus: true
    - name: codex-focused
      root:
        dir: h
        splits: [50%, 50%]
        panes:
          - dir: v
            splits: [1, 20%]
            panes:
              - nvim
              - shell
          - command: codex
            focus: true
    - name: claude-focused-portrait
      root:
        dir: v
        splits: [50%, 50%]
        panes:
          - command: claude
            focus: true
          - dir: h
            splits: [1, 20%]
            panes:
              - nvim
              - shell
    - name: codex-focused-portrait
      root:
        dir: v
        splits: [50%, 50%]
        panes:
          - command: codex 
            focus: true
          - dir: h
            splits: [1, 20%]
            panes:
              - nvim
              - shell
    - name: claude-two-right
      root:
        dir: h
        splits: [50%, 50%]
        panes:
          - dir: v
            splits: [1, 20%]
            panes:
              - nvim
              - shell
          - dir: v
            splits: [50%, 50%]
            panes:
              - command: claude
                scale: 1
                focus: true
              - command: claude
                scale: 2
    - name: claude-3col
      root:
        dir: h
        splits: [1, 1, 1]
        panes:
          - command: claude
            scale: 1
            focus: true
          - command: claude
            scale: 2
          - command: claude
            scale: 3
    - name: codex-3col
      root:
        dir: h
        splits: [1, 1, 1]
        panes:
          - command: codex
            scale: 1
            focus: true
          - command: codex
            scale: 2
          - command: codex
            scale: 3
    - name: all-agents
      root:
        dir: h
        splits: [1, 1, 1]
        panes:
          - dir: v
            splits: [1, 1]
            panes:
              - command: claude
                scale: 1
                focus: true
              - command: codex
                scale: 1
          - dir: v
            splits: [1, 1]
            panes:
              - command: claude
                scale: 2
              - command: codex
                scale: 2
          - dir: v
            splits: [1, 1]
            panes:
              - command: claude
                scale: 3
              - command: codex
                scale: 3
