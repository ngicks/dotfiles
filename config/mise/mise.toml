[settings]
experimental = true
auto_install = true
lockfile = true

minimum_release_age_excludes = [
  # My own tools!
  "go:github.com/ngicks/crabswarm/cmd/crabswarm",
  "go:github.com/ngicks/cmdman/cmd/cmdman",
  "go:github.com/ngicks/go-ngcheckers/cmd/ngcheckers",
  "go:github.com/ngicks/oci-image-copy/cmd/oci-image-copy",
  "go:github.com/ngicks/dotfiles-tool/podman-static-dist/cmd/podman-static-dist",
  "go:github.com/ngicks/run-in-tmux-popup/cmd/tmux-popup-pinentry-curses",
  "go:github.com/ngicks/run-in-tmux-popup/cmd/zellij-popup-pinentry-curses",
  "moon:https://github.com/ngicks/dotfiles-tool#dotfilesmgr",
  # codex needs updates for newer models
  "npm:@openai/codex",
]

trusted_config_paths = [
  '~/.config/mise/mise.toml',
  '~/.dotfiles/config/mise/mise.toml',
]

[settings.pipx]
uvx = true

[settings.cargo]
binstall = true

[plugins]
# Short tag notation (#0.0.1) is added in https://github.com/jdx/mise/pull/10998
# Change to it after 2026.7.7
moon = "https://github.com/ngicks/mise-moon-backend-plugin#refs/tags/0.0.3"

[tools]
# LLM stuff
## cli tools
"npm:@openai/codex" = "latest"
"npm:difit" = "latest"
"github:microsoft/waza" = "latest"
"pipx:apm-cli" = "latest"
## mcp
"npm:@upstash/context7-mcp" = "latest"

# zenn
"npm:zenn-cli" = "latest"

"ruff" = "latest"

# Helm
"aqua:helm/chart-releaser" = "latest"
"aqua:helm/chart-testing" = "latest"

# Tree-sitter
"cargo:tree-sitter-cli" = "latest"

# Go Development
"go:golang.org/dl/gotip" = { version = "latest", install_env = { CGO_ENABLED = "0" } }
"go:golang.org/x/pkgsite/cmd/pkgsite" = { version = "latest", install_env = { CGO_ENABLED = "0" } }
"go:github.com/nametake/golangci-lint-langserver" = { version = "latest", install_env = { CGO_ENABLED = "0" } }
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = { version = "latest", install_env = { CGO_ENABLED = "0" } }
"go:github.com/golangci/golangci-lint/cmd/golangci-lint" = { version = "latest", install_env = { CGO_ENABLED = "0" } }

"go:github.com/chrishrb/go-grip" = { version = "latest", install_env = { CGO_ENABLED = "0" } }
"go:github.com/mattn/memo" = { version = "latest", install_env = { CGO_ENABLED = "0" } }

# Own rapidly-evolving prototypes
"go:github.com/ngicks/dotfiles-tool/podman-static-dist/cmd/podman-static-dist" = { version = "0.0.2", install_env = { CGO_ENABLED = "0" } }
"go:github.com/ngicks/crabswarm/cmd/crabswarm" = { version = "0.0.11", install_env = { CGO_ENABLED = "0" } }
"go:github.com/ngicks/cmdman/cmd/cmdman" = { version = "0.0.15", install_env = { CGO_ENABLED = "0" } }
"go:github.com/ngicks/go-ngcheckers/cmd/ngcheckers" = { version = "0.0.3", install_env = { CGO_ENABLED = "0" } }
"go:github.com/ngicks/oci-image-copy/cmd/oci-image-copy" = { version = "0.0.1", install_env = { CGO_ENABLED = "0" } }
## pinentry in tmux/zellij popup; repo is untagged, so pin the pseudo-version.
"go:github.com/ngicks/run-in-tmux-popup/cmd/tmux-popup-pinentry-curses" = { version = "0.0.0-20260713114403-6ed9be4a10a5", install_env = { CGO_ENABLED = "0" } }
"go:github.com/ngicks/run-in-tmux-popup/cmd/zellij-popup-pinentry-curses" = { version = "0.0.0-20260713114403-6ed9be4a10a5", install_env = { CGO_ENABLED = "0" } }

## moon: backend is my own plugin: see [plugins] above.
## The build runs sandboxed in the quadlet-built image
## (config/containers-quadlet/moonbit-installer-sandbox.build); the image bakes
## in no CA bundle, so mount the host's — moon install fetches over TLS.
[tools."moon:https://github.com/ngicks/dotfiles-tool#dotfilesmgr"]
version = "0.0.1"
tag_prefix = "dotfilesmgr/v"
sandbox = { runtime = "podman", image = "ghcr.io/ngicks/mise-moon-backend-plugin/moonbit-installer-sandbox:ubuntu-latest", options = [
  "--mount",
  "type=bind,src=/etc/ssl/certs/ca-certificates.crt,dst=/etc/ssl/certs/ca-certificates.crt,ro",
] }

[shell_alias]
golangci-lint-v1 = "mise exec 'go:github.com/golangci/golangci-lint/cmd/golangci-lint' -- golangci-lint "
golangci-lint-v2 = "mise exec 'go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint' -- golangci-lint "

[env]

[alias]
